services:
  backend:
    image: ghcr.io/friendotjava/askperaturan/backend:latest
    restart: always
    env_file: .env.prod
    volumes:
      - chroma_data:/app/chroma
      - ./backend/docs:/app/docs
    expose:
      - "8000"

  frontend:
    image: ghcr.io/friendotjava/askperaturan/frontend:latest
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend


volumes:
  chroma_data: